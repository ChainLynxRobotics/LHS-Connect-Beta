name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to master if your default branch is named master

permissions:
  contents: read
  pages: write      # Grants permission to force-enable Pages via code
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true  # Forces GitHub to initialize the Pages resource

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Serves files from your root folder. Change to './dist' or './build' if using a framework.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
