name: Auto-Update Git Log

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'git logger/git-log-box.txt'

jobs:
  update-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Fetches the entire history for a full log rebuild

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Log
        run: python3 -c "from commit import update_log; update_log()"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "git logger/git-log-box.txt"
          
          # Only push if there's a change to the text file
          if git diff --staged --quiet; then
            echo "No changes to the log."
          else
            git commit -m "docs: auto-update git-log-box.txt [skip ci]"
            git push
          fi