<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LHS Connect Beta</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="horiz-scroll-fix.js" defer></script>
</head>
<body>

    <header class="main-header">
        <div class="title-wrapper">
            <h1 class="title">LHS Connect</h1>
            <h1 class="subtitle offset">Beta</h1>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="panel-group">
            <article class="card horizontal">
                <h2 class="heading">Horizontal Static 2</h2>
                <div class="card-content">
                    <p class="normal">Item X</p>
                    <p class="normal">Item Y</p>
                    <p class="normal">Item Z</p>
                </div>
            </article>
            <article class="card vertical">
                <h2 class="heading">Vertical Static 2</h2>
                <div class="card-content">
                    <p class="normal">Item X</p>
                    <p class="normal">Item Y</p>
                    <p class="normal">Item Z</p>
                </div>
            </article>
        </section>

        <section class="panel-group">
            <section class="card">
                <h2 class="heading sticky-header">Vertical Scrollable</h2>
                <div class="scroll-v">
                    <div class="scroll-item"><p>Scrollable Item 1</p></div>
                    <div class="scroll-item"><p>Scrollable Item 2</p></div>
                </div>
            </section>

            <section class="card">
                <h2 class="heading sticky-header">Horizontal Scrollable</h2>
                <div class="scroll-h">
                    <div class="scroll-item"><p>Item X</p></div>
                    <div class="scroll-item"><p>Item Y</p></div>
                </div>
            </section>
        </section>

        <section class="panel-group">
            <article class="card">
                <h2 class="heading sticky-header">Git Log</h2>
                <div class="scroll-v" id="git-log-list">
                    <div class="scroll-item"><p>Loading history...</p></div>
                </div>
            </article>
        </section>
    </main>

    <script src="git logger/git-log.js" defer></script>
</body>
</html>
